name: Recon-Advanced-Monitoring

on:
  schedule:
    - cron: '0 */6 * * *' # كل 6 ساعات
  workflow_dispatch:

jobs:
  recon-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Hunting Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/katana/cmd/katana@latest
          go install -v github.com/lc/gau/v2/cmd/gau@latest
          go install -v github.com/projectdiscovery/anew@latest
          go install -v github.com/projectdiscovery/notify/cmd/notify@latest
          pip install uro
          echo "/home/runner/go/bin" >> $GITHUB_PATH

      - name: Setup Notification
        env:
          NOTIFY_CONFIG: ${{ secrets.NOTIFY_CONFIG }}
        run: |
          mkdir -p ~/.config/notify/
          echo "$NOTIFY_CONFIG" > ~/.config/notify/provider-config.yaml

      - name: Execute Recon Script
        run: |
          chmod +x recon.sh
          ./recon.sh .

      - name: Git Persistence (Save State)
        run: |
          git config --local user.email "recon-bot@github.com"
          git config --local user.name "Recon-Bot"
          # إضافة جميع ملفات "الذاكرة" لضمان عدم تكرار التنبيهات ومراقبة التغيير
          git add all-domains.txt all_live_urls.txt FINAL_JS_ENDPOINTS.txt js_history_metadata.txt
          git commit -m "Update Recon State: $(date +'%Y-%m-%d %H:%M')" || echo "No changes found"
          git push
